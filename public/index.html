<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ro'yxatdan o'tish</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="bg-shape shape1"></div>
  <div class="bg-shape shape2"></div>

  <div class="card">
    <div class="card-header">
      <div class="icon">✦</div>
      <h1>Ma'lumot Qoldiring</h1>
      <p>Ism va telefon raqamingizni kiriting</p>
    </div>

    <form id="contactForm">
      <div class="field">
        <label for="name">Ism Familiya</label>
        <input type="text" id="name" name="name" placeholder="Masalan: Alisher Navoiy" required />
      </div>

      <div class="field">
        <label for="phone">Telefon Raqam</label>
        <input type="tel" id="phone" name="phone" placeholder="+998 90 123 45 67" required />
      </div>

      <button type="submit" id="submitBtn">
        <span class="btn-text">Yuborish</span>
        <span class="btn-loader" style="display:none">⏳ Yuborilmoqda...</span>
      </button>
    </form>

    <div id="message" class="message"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
