<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ro'yxatdan o'tish</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 30px 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 420px;
        }
        h2 { 
            text-align: center; 
            margin-bottom: 25px; 
            color: #333; 
        }
        input, select {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover { background: #5a67d8; }
        .error { color: red; font-size: 14px; margin: 5px 0; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>Ro'yxatdan o'tish</h2>
    
    <form id="registerForm" action="register.php" method="POST">
        <input type="text" name="full_name" placeholder="To'liq ism" required>
        
        <input type="text" name="username" placeholder="Foydalanuvchi nomi" required>
        <div class="error" id="usernameError"></div>
        
        <input type="email" name="email" placeholder="Email manzil" required>
        <div class="error" id="emailError"></div>
        
        <input type="password" name="password" id="password" placeholder="Parol" required>
        <input type="password" name="confirm_password" id="confirm_password" placeholder="Parolni tasdiqlang" required>
        
        <input type="tel" name="phone" placeholder="Telefon (+998901234567)">
        
        <input type="date" name="birth_date">
        
        <select name="gender">
            <option value="">Jinsni tanlang</option>
            <option value="male">Erkak</option>
            <option value="female">Ayol</option>
            <option value="other">Boshqa</option>
        </select>
        
        <button type="submit">Ro'yxatdan o'tish</button>
    </form>
</div>

<script>
document.getElementById('registerForm').addEventListener('submit', function(e) {
    const pass = document.getElementById('password').value;
    const confirm = document.getElementById('confirm_password').value;
    
    if (pass !== confirm) {
        alert("Parollar mos kelmayapti!");
        e.preventDefault();
    }
});
</script>

</body>
</html>
