<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ro'yxatdan o'tish</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 30px 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 420px;
        }
        h2 { text-align: center; margin-bottom: 25px; color: #333; }
        input, select {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover { background: #5a67d8; }
        button:disabled { background: #999; cursor: not-allowed; }

        #message {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            display: none;
        }
        .success { background: #d4edda; color: #155724; }
        .error   { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

<div class="container">
    <h2>Ro'yxatdan o'tish</h2>
    
    <form id="registerForm">
        <input type="text" name="full_name" placeholder="To'liq ism" required>
        <input type="text" name="username" placeholder="Foydalanuvchi nomi" required>
        <input type="email" name="email" placeholder="Email manzil" required>
        <input type="password" name="password" id="password" placeholder="Parol" required>
        <input type="password" name="confirm_password" id="confirm_password" placeholder="Parolni tasdiqlang" required>
        <input type="tel" name="phone" placeholder="Telefon (+998901234567)">
        <input type="date" name="birth_date">
        
        <select name="gender">
            <option value="">Jinsni tanlang</option>
            <option value="male">Erkak</option>
            <option value="female">Ayol</option>
            <option value="other">Boshqa</option>
        </select>
        
        <button type="submit" id="submitBtn">Ro'yxatdan o'tish</button>
    </form>

    <div id="message"></div>
</div>

<script>
const form = document.getElementById('registerForm');
const messageDiv = document.getElementById('message');
const submitBtn = document.getElementById('submitBtn');

form.addEventListener('submit', async function(e) {
    e.preventDefault();

    // Parol tekshirish
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirm_password').value;

    if (password !== confirm) {
        showMessage("Parollar mos kelmayapti!", "error");
        return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = "Yuborilmoqda...";

    const formData = new FormData(form);

    try {
        const response = await fetch('register.php', {
            method: 'POST',
            body: formData
        });

        const result = await response.text();

        if (result.includes("muvaffaqiyatli") || result.includes("✅")) {
            showMessage("✅ Sorovingiz qabul qilindi! Ro'yxatdan o'tish muvaffaqiyatli.", "success");
            form.reset();
        } else if (result.includes("allaqachon mavjud")) {
            showMessage("❌ Bu username yoki email allaqachon mavjud.", "error");
        } else {
            showMessage("❌ Xatolik yuz berdi. Qayta urinib ko'ring.", "error");
        }
    } catch (error) {
        showMessage("❌ Server bilan bog'lanishda xatolik.", "error");
    }

    submitBtn.disabled = false;
    submitBtn.textContent = "Ro'yxatdan o'tish";
});

function showMessage(text, type) {
    messageDiv.textContent = text;
    messageDiv.className = `message ${type}`;
    messageDiv.style.display = "block";
}
</script>

</body>
</html>
